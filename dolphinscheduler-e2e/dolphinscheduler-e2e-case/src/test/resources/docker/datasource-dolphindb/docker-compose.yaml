version: "3.8"

services:
  dolphinscheduler:
    image: apache/dolphinscheduler-standalone-server:ci
    environment:
      MASTER_SERVER_LOAD_PROTECTION_MAX_SYSTEM_CPU_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      MASTER_SERVER_LOAD_PROTECTION_MAX_JVM_CPU_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      MASTER_SERVER_LOAD_PROTECTION_MAX_SYSTEM_MEMORY_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      MASTER_SERVER_LOAD_PROTECTION_MAX_DISK_MEMORY_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      WORKER_SERVER_LOAD_PROTECTION_MAX_SYSTEM_CPU_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      WORKER_SERVER_LOAD_PROTECTION_MAX_JVM_CPU_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      WORKER_SERVER_LOAD_PROTECTION_MAX_SYSTEM_MEMORY_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      WORKER_SERVER_LOAD_PROTECTION_MAX_DISK_MEMORY_USAGE_PERCENTAGE_THRESHOLDS: 0.95
      WORKER_TENANT_CONFIG_AUTO_CREATE_TENANT_ENABLED: 'true'
    ports:
      - "12345:12345"
    networks:
      - e2e
    healthcheck:
      test: [ "CMD", "curl", "http://localhost:12345/dolphinscheduler/actuator/health" ]
      interval: 5s
      timeout: 5s
      retries: 120
    depends_on:
      dolphindb:
        condition: service_healthy

  dolphindb:
    image: dolphindb/dolphindb:v3.00.2.6
    restart: always
    environment:
      - DOLPHINDB_ADMIN=admin
      - DOLPHINDB_PASSWORD=123456
    networks:
      - e2e
    ports:
      - "8848:8848"
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8848 || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 5
      start_period: 60s

volumes:
  dolphindb_data:

networks:
  e2e:
